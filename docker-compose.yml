services:
  db:
    build:
      context: ./db
    image: ${DOCKERHUB_USERNAME:-local}/sales-db:${DB_IMAGE_TAG:-latest}
    container_name: sales-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sales_net

  app:
    build:
      context: .
    image: ${DOCKERHUB_USERNAME:-local}/sales-app:${APP_IMAGE_TAG:-latest}
    container_name: sales-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME}
      HOST: ${HOST}
      PORT: ${PORT}
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL}
      DB_POOL_MAX: ${DB_POOL_MAX}
      DB_IDLE_TIMEOUT_MS: ${DB_IDLE_TIMEOUT_MS}
      DB_CONN_TIMEOUT_MS: ${DB_CONN_TIMEOUT_MS}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      NODE_ENV: production
    ports:
      - "${PORT}:${PORT}"
    networks:
      - sales_net

volumes:
  postgres_data:

networks:
  sales_net:
